<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vin Mobile - Textbook Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --paper-bg: #FFFFFF;
            --text-main: #334155;
            --accent-blue: #2563EB;
            --accent-green: #059669;
            --accent-orange: #EA580C;
            --border: #E2E8F0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #F8FAFC;
            color: var(--text-main);
            overscroll-behavior-y: contain;
        }

        .serif { font-family: 'Noto Serif JP', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Mobile specific adjustments */
        .paper-page {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            min-height: 100dvh;
            padding: 1rem 1.25rem 5rem 1.25rem; /* bottom padding for nav */
            box-shadow: 0 0 40px rgba(0,0,0,0.03);
        }

        /* Textbook Elements */
        .question-block {
            padding: 0.5rem 0.25rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .q-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.8rem;
            height: 1.1rem;
            border: 1.5px solid var(--accent-blue);
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 0.7rem;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .explanation-pop {
            background: #F0FDF4;
            border: 1px solid #DCFCE7;
            padding: 0.5rem 0.75rem;
            margin: 0.25rem 0 1.5rem 0;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .summary-box {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .deep-dive {
            background: #F0FDFA;
            border: 1px solid #CCFBF1;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .check-box {
            background: #FDF2F8;
            border: 1px solid #FCE7F3;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .term-box {
            background: #FFF7ED;
            border: 1px solid #FFEDD5;
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: 6px;
        }

        .eng-text { font-family: 'Times New Roman', serif; font-size: 1.05rem; font-weight: 500; color: #1E293B; line-height: 1.4; }
        .ja-text { font-size: 0.85rem; color: #64748B; line-height: 1.4; }
        .supp-text { font-size: 12px; font-weight: 700; color: #475569; }

        .tb-tag {
            font-size: 11px;
            font-weight: 900;
            opacity: 0.6;
            line-height: 1;
        }

        /* Masking */
        .revealed .mask-btn { display: none; }
        .masked-container { position: relative; min-height: 1.25rem; margin: 0.4rem 0; }
        .masked-content { display: none; }
        .revealed .masked-content { display: block; }
        .mask-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F1F5F9;
            border: 1px solid #E2E8F0;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            color: #64748B;
            width: 100%;
        }

        .jump-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .jump-btn.to-expl { background: #ECFDF5; color: #059669; border: 1px solid #D1FAE5; }
        .jump-btn.to-q { background: #F0F9FF; color: #0284C7; border: 1px solid #E0F2FE; }

        /* Animation */
        .page-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nav Bar Glass */
        .nav-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Outline Items */
        .outline-item {
            padding: 1.25rem;
            border-bottom: 1px solid #F1F5F9;
            transition: background 0.2s;
        }
        .outline-item:active { background: #F1F5F9; }
        .outline-item.active { background: #EFF6FF; border-left: 4px solid var(--accent-blue); }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <!-- UPLOAD OVERLAY -->
    <div id="drop-zone" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div class="space-y-8 animate-in fade-in zoom-in duration-500" onclick="document.getElementById('file-input').click()">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto shadow-inner">
                <i data-lucide="file-up" class="w-10 h-10"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black serif text-gray-900 tracking-tight">Vin Mobile</h1>
                <p class="text-sm text-gray-400 mt-2">ファイルをタップして読込</p>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".json" multiple>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-4 sticky top-0 z-50 shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-blue-900 text-white rounded flex items-center justify-center">
                <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
            </div>
            <h1 class="font-black text-xs uppercase tracking-tighter">Vin <span class="text-blue-700">Mobile</span></h1>
        </div>
        <div class="flex items-center gap-1.5">
            <select id="ss-selector" onchange="changeTextbook(this.value)" class="text-xs font-black text-slate-700 bg-slate-50 border border-slate-200 px-2 py-1 rounded outline-none cursor-pointer">
                <option value="1">CH 1</option>
                <option value="2">CH 2</option>
                <option value="3">CH 3</option>
                <option value="4">CH 4</option>
                <option value="5">CH 5</option>
                <option value="6">CH 6</option>
                <option value="7">CH 7</option>
                <option value="8">CH 8</option>
                <option value="9">CH 9</option>
                <option value="10">CH 10</option>
                <option value="11">CH 11</option>
                <option value="12">CH 12</option>
                <option value="13">CH 13</option>
                <option value="14">CH 14</option>
                <option value="15">CH 15</option>
                <option value="16">CH 16</option>
                <option value="17">CH 17</option>
                <option value="18">CH 18</option>
                <option value="19">CH 19</option>
                <option value="20">CH 20</option>
                <option value="21">CH 21</option>
                <option value="22">CH 22</option>
                <option value="23">CH 23</option>
                <option value="24">CH 24</option>
                <option value="25">CH 25</option>
                <option value="26">CH 26</option>
                <option value="27">CH 27</option>
                <option value="28">CH 28</option>
            </select>
            <div id="chapter-label" class="text-[9px] font-black text-gray-400 bg-gray-50 px-2. py-1 rounded uppercase tracking-wider truncate max-w-[80px]">
                No Data
            </div>
        </div>
        <button onclick="location.reload()" class="p-2 text-gray-300">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        </button>
    </header>

    <!-- MAIN VIEWPORT -->
    <main id="main-scroll" class="flex-1 overflow-y-auto overflow-x-hidden">
        <div id="content-area" class="paper-page page-fade-in">
            <!-- Outline or Content Injected Here -->
            <div class="flex flex-col items-center justify-center py-40 opacity-20">
                <i data-lucide="layers" class="w-16 h-16 mb-4"></i>
                <p class="serif italic">Select a Section</p>
            </div>
        </div>
    </main>

    <!-- SEARCH BAR (Floating or Toggle) -->
    <div id="search-container" class="fixed bottom-20 left-4 right-4 z-40 hidden">
        <div class="bg-white border border-gray-200 shadow-2xl rounded-2xl p-2 flex items-center gap-2">
            <i data-lucide="search" class="w-4 h-4 text-gray-400 ml-2"></i>
            <input type="text" id="search-input" placeholder="検索キーワード..." class="flex-1 bg-transparent border-none outline-none text-sm py-2 font-medium">
            <button onclick="toggleSearch()" class="p-2 text-gray-400"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="h-16 nav-glass fixed bottom-0 left-0 right-0 flex items-center justify-around px-2 z-50">
        <button onclick="setTab('outline')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400" id="nav-outline">
            <i data-lucide="list" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Outline</span>
        </button>
        <button onclick="setTab('question')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400" id="nav-question">
            <i data-lucide="help-circle" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Quest</span>
        </button>
        <button onclick="setTab('explanation')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400" id="nav-explanation">
            <i data-lucide="message-square" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Expl</span>
        </button>
        <button onclick="setTab('summary')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400" id="nav-summary">
            <i data-lucide="bookmark" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Summ</span>
        </button>
        <button onclick="setTab('all')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-gray-400" id="nav-all">
            <i data-lucide="layout" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold uppercase tracking-widest">Comp</span>
        </button>
    </nav>

    <script>
        let rawData = null;
        let items = [];
        let selectedSectionId = null;
        let currentTab = 'outline'; // outline, all, question, explanation, summary
        let searchQuery = '';

        let activeChapters = [1];
        let selectedChaptersToLoad = [];
        let isMultiSelectMode = false;

        // File Handler for multiple files
        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = e.target.files;
            if (files && files.length > 0) {
                handleUserFiles(files);
            }
        });

        function handleUserFiles(files) {
            let loadedCount = 0;
            let mergedItems = [];
            let mergedMetadata = {};

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = (re) => {
                    try {
                        const parsed = JSON.parse(re.target.result);
                        const fileItems = parsed.entries || parsed.items || parsed.nodes || [];
                        mergedItems.push(...fileItems);
                        if (parsed.metadata) {
                            mergedMetadata = Object.assign(mergedMetadata, parsed.metadata);
                        }
                    } catch (err) {
                        console.error('JSON parsing error', err);
                    }
                    loadedCount++;
                    if (loadedCount === files.length) {
                        const uniqueMap = new Map();
                        mergedItems.forEach(item => {
                            const itemId = item.id || `${item.type}-${item.order}`;
                            uniqueMap.set(itemId, item);
                        });

                        rawData = {
                            metadata: mergedMetadata,
                            entries: Array.from(uniqueMap.values())
                        };
                        items = rawData.entries || [];
                        
                        // Treat as manual custom load
                        activeChapters = [];
                        selectedChaptersToLoad = [];
                        isMultiSelectMode = false;
                        
                        initApp();
                    }
                };
                reader.readAsText(file);
            }
        }

        const CHAPTER_TITLES = {
            1: "時制",
            2: "受動態",
            3: "助動詞",
            4: "仮定法",
            5: "不定詞",
            6: "動名詞",
            7: "分詞",
            8: "比較",
            9: "関係詞",
            10: "接続詞",
            11: "前置詞",
            12: "主語と動詞の一致・話法",
            13: "否定",
            14: "疑問・強調・倒置・省略",
            15: "動詞の語法",
            16: "形容詞・副詞の語法",
            17: "名詞・代名詞の語法",
            18: "動詞を中心とするイディオム",
            19: "形容詞・副詞を中心とするイディオム",
            20: "名詞を中心とするイディオム",
            21: "前置詞を含むイディオム",
            22: "会話表現",
            23: "語彙・ボキャブラリー",
            24: "発音",
            25: "アクセント",
            26: "文構造・重要文型",
            27: "前置詞・群前置詞",
            28: "総合問題"
        };

        function populateChapterSelector() {
            const selector = document.getElementById('ss-selector');
            if (!selector) return;
            selector.innerHTML = '';
            for (let num = 1; num <= 28; num++) {
                const opt = document.createElement('option');
                opt.value = num;
                opt.textContent = `CH ${num}: ${CHAPTER_TITLES[num] || ('Chapter ' + num)}`;
                selector.appendChild(opt);
            }
        }

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // Auto-load if default files exist
        window.addEventListener('DOMContentLoaded', () => {
            populateChapterSelector();
            let ssNum = getQueryParam('ch') || getQueryParam('ss') || '1';
            let chaptersToLoad = [];
            ssNum.split(',').forEach(item => {
                let parsed = parseInt(item.trim());
                if (!isNaN(parsed) && parsed >= 1 && parsed <= 28) {
                    chaptersToLoad.push(parsed);
                }
            });
            if (chaptersToLoad.length === 0) {
                chaptersToLoad = [1];
            }
            loadTextbooks(chaptersToLoad, false);
        });

        function loadTextbooks(nums, keepTab = false) {
            activeChapters = nums;
            
            const promises = nums.map(num => {
                return fetch(`textbooks/vin_ch${num}.json`)
                    .then(response => {
                        if (response.ok) return response.json();
                        throw new Error(`CH ${num} not found`);
                    })
                    .catch(err => {
                        console.warn(err);
                        return null;
                    });
            });

            Promise.all(promises).then(datasets => {
                const validData = datasets.filter(d => d !== null);
                if (validData.length > 0) {
                    let mergedItems = [];
                    let lastMeta = {};
                    datasets.forEach((d, index) => {
                        if (d === null) return;
                        const num = nums[index];
                        const fileItems = d.entries || d.items || d.nodes || [];
                        fileItems.forEach(item => {
                            item.chapter_num = num;
                        });
                        mergedItems.push(...fileItems);
                        if (d.metadata) {
                            lastMeta = Object.assign(lastMeta, d.metadata);
                        }
                    });

                    const uniqueMap = new Map();
                    mergedItems.forEach(item => {
                        const itemId = item.id || `${item.type}-${item.order}`;
                        uniqueMap.set(itemId, item);
                    });

                    rawData = {
                        metadata: {
                            chapter_id: nums.length > 1 ? `合体` : lastMeta.chapter_id,
                            chapter_title: nums.length > 1 ? `${nums.length}章合体中` : lastMeta.chapter_title
                        },
                        entries: Array.from(uniqueMap.values())
                    };
                    items = rawData.entries || [];
                    initApp(keepTab);
                    updateChapterSelectionUI();
                } else {
                    fetch('textbooks/vin_1-31.json')
                        .then(response => {
                            if (response.ok) return response.json();
                            throw new Error('Not found');
                        })
                        .then(data => {
                            rawData = data;
                            items = rawData.entries || rawData.items || [];
                            items.forEach(item => {
                                if (item.id) {
                                    const match = String(item.id).match(/^(\d+)-/);
                                    if (match) {
                                        item.chapter_num = parseInt(match[1]);
                                    }
                                }
                            });
                            initApp(keepTab);
                        })
                        .catch(e => console.log('Default data loaded failure.'));
                }
            });
        }

        function changeTextbook(num) {
            let parsed = parseInt(num);
            if (isNaN(parsed)) return;

            // Step 5: reset selected section
            selectedSectionId = null;
            activeChapters = [parsed];
            selectedChaptersToLoad = [parsed];

            const url = new URL(window.location);
            url.searchParams.set('ch', num);
            url.searchParams.delete('ss');
            window.history.pushState({}, '', url);
            
            // Step 3: Keep the current view tab active when changing chapters via dropdown
            loadTextbooks([parsed], true);
        }

        function toggleSelectMode() {
            // Deprecated, maintained as empty shell
        }

        function handleChapterGridClick(num) {
            changeTextbook(num);
        }

        function loadSelectedMulti() {
            // Deprecated, maintained as empty shell
        }

        function updateChapterSelectionUI() {
            const selector = document.getElementById('ss-selector');
            if (selector) {
                if (activeChapters.length > 0) {
                    selector.value = activeChapters[0];
                }
            }
        }

        function initApp(keepTab = false) {
            document.getElementById('drop-zone').classList.add('hidden');
            
            const currentCh = activeChapters[0] || 1;
            const chTitle = CHAPTER_TITLES[currentCh] || 'Dataset';
            const label = document.getElementById('chapter-label');
            if (label) {
                label.innerText = `CH ${currentCh} ${chTitle}`;
            }
            
            // Selecting chapters resets any selected section
            selectedSectionId = null;

            if (keepTab) {
                render();
            } else {
                setTab('outline');
            }
        }

        function setTab(tab) {
            currentTab = tab;
            updateNavUI();
            render();
            document.getElementById('main-scroll').scrollTop = 0;
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-blue-600', 'text-gray-400'));
            const active = document.getElementById(`nav-${currentTab}`);
            if (active) active.classList.replace('text-gray-400', 'text-blue-600');
        }

        function selectSection(id) {
            selectedSectionId = id;
            setTab('all');
        }

        function clearSectionSelection(e) {
            if (e) e.stopPropagation();
            selectedSectionId = null;
            render();
        }

        function render() {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            area.classList.remove('page-fade-in');
            void area.offsetWidth; // trigger reflow
            area.classList.add('page-fade-in');

            if (currentTab === 'outline') {
                renderOutline(area);
            } else {
                renderContent(area);
            }
            lucide.createIcons();
        }

        function renderOutline(area) {
            const currentCh = activeChapters[0] || 1;
            const chTitle = CHAPTER_TITLES[currentCh] || 'Dataset';
            
            const sections = items.filter(i => {
                if (i.type !== 'section_header') return false;
                const chNum = i.chapter_num || (i.id ? parseInt(String(i.id).split('-')[0]) : null);
                if (chNum !== null && chNum !== currentCh) return false;
                return true;
            });
            
            const sectionsHtml = sections.length > 0 ? sections.map(s => {
                const sectionQuestions = items.filter(i => i.type === 'question' && (i.section_id === s.section_id || i.target_s === s.section_id));
                let qRange = '';
                if (sectionQuestions.length > 0) {
                    const nums = sectionQuestions.map(q => parseInt(q.number)).filter(n => !isNaN(n));
                    if (nums.length > 0) {
                        const min = String(Math.min(...nums)).padStart(4, '0');
                        const max = String(Math.max(...nums)).padStart(4, '0');
                        qRange = `qest ${min}-${max}`;
                    }
                }

                return `
                <div class="outline-item ${selectedSectionId === s.section_id ? 'active' : ''}" onclick="selectSection('${s.section_id}')">
                    <div class="flex items-center justify-between pointer-events-auto">
                        <div class="flex items-center gap-2 mb-1.5">
                            <div class="text-[12px] font-mono font-black ${selectedSectionId === s.section_id ? 'bg-blue-600 text-white shadow-sm' : 'bg-sky-50 text-sky-900 border border-sky-100/50'} px-2.5 py-0.5 rounded">SEC ${s.section_id}</div>
                            ${qRange ? `<div class="text-[12px] font-mono font-black text-slate-700 uppercase tracking-tight bg-slate-100 border border-slate-200/50 px-1.5 rounded">${qRange}</div>` : ''}
                        </div>
                        <span class="text-[9px] font-mono font-black text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">CH ${s.chapter_num || currentCh}</span>
                    </div>
                    <div class="font-bold text-[14px] serif leading-tight text-slate-800">${s.title}</div>
                </div>
                `;
            }).join('') : `
            <div class="py-12 text-center text-gray-400 italic text-xs bg-slate-50 border border-dashed border-slate-200 rounded-2xl space-y-2 m-4">
                <i data-lucide="info" class="w-8 h-8 text-slate-300 mx-auto"></i>
                <p class="font-bold text-slate-400 uppercase tracking-widest text-[9.5px]">セクションデータがありません</p>
                <p class="text-[10px] text-gray-400">上のセレクトボックスから選択してください。</p>
            </div>
            `;

            area.innerHTML = `
            <div class="p-4 bg-gradient-to-br from-slate-50 to-blue-50/20 border-b border-gray-100 shadow-sm rounded-b-2xl">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i data-lucide="compass" class="w-4 h-4 text-blue-700"></i>
                        <span class="text-xs font-black text-slate-800 tracking-tight">セクション選択（第${currentCh}章: ${chTitle}）</span>
                    </div>
                    <span class="bg-white border border-slate-200 text-[9px] font-black px-2 py-0.5 rounded text-slate-500">
                        セクション数: ${sections.length}
                    </span>
                </div>
            </div>
            <div class="p-3 space-y-2.5">${sectionsHtml}</div>
            `;
        }

        function renderContent(area) {
            const search = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = [];
            if (selectedSectionId) {
                // If section is selected, filter by section across all views
                filtered = items.filter(i => {
                    if (i.type === 'section_header') {
                        return i.section_id === selectedSectionId;
                    }
                    
                    let belongs = (i.section_id === selectedSectionId || i.target_s === selectedSectionId);
                    if (!belongs && i.type === 'explanation') {
                        const q = items.find(it => it.id === i.target_q);
                        belongs = q && q.section_id === selectedSectionId;
                    }
                    if (!belongs) return false;

                    // Tab filter
                    if (currentTab === 'question' && i.type !== 'question') return false;
                    if (currentTab === 'explanation' && i.type !== 'explanation') return false;
                    if (currentTab === 'summary' && !['summary_box', 'grammar_term', 'deep_dive', 'confirmation_box'].includes(i.type)) return false;

                    if (search) {
                        const text = JSON.stringify(i).toLowerCase();
                        if (!text.includes(search)) return false;
                    }
                    return true;
                });
            } else {
                // If NO section is selected, filter by active chapters across all views
                filtered = items.filter(i => {
                    const chNum = i.chapter_num || (i.id ? parseInt(String(i.id).split('-')[0]) : null);
                    if (chNum !== null && activeChapters.length > 0 && !activeChapters.includes(chNum)) return false;

                    // Tab filter
                    if (currentTab === 'question' && i.type !== 'question') return false;
                    if (currentTab === 'explanation' && i.type !== 'explanation') return false;
                    if (currentTab === 'summary' && !['summary_box', 'grammar_term', 'deep_dive', 'confirmation_box'].includes(i.type)) return false;

                    if (search) {
                        const text = JSON.stringify(i).toLowerCase();
                        if (!text.includes(search)) return false;
                    }
                    return true;
                });
            }

            // Sort filtered items by chapter first, then by order
            filtered.sort((a, b) => {
                if (a.chapter_num !== b.chapter_num) return a.chapter_num - b.chapter_num;
                return (a.order || 0) - (b.order || 0);
            });

            let displayList = [];
            if (selectedSectionId) {
                const header = filtered.find(i => i.type === 'section_header');
                if (header) displayList.push(header);

                if (currentTab === 'all') {
                    const questions = filtered.filter(i => i.type === 'question');
                    questions.forEach(q => {
                        displayList.push(q);
                        const expl = filtered.find(e => e.type === 'explanation' && e.target_q === q.id);
                        if (expl) displayList.push(expl);
                    });
                    const others = filtered.filter(i => ['summary_box', 'grammar_term', 'deep_dive', 'confirmation_box'].includes(i.type));
                    displayList.push(...others);
                } else {
                    displayList.push(...filtered.filter(i => i.type !== 'section_header'));
                }
            } else {
                // Display raw chapter items
                displayList.push(...filtered);
            }

            // Focus Banner inside the main scrollable area
            let activeFocusBanner = '';
            if (selectedSectionId) {
                const head = items.find(i => i.type === 'section_header' && i.section_id === selectedSectionId);
                const title = head ? head.title : '';
                activeFocusBanner = `
                <div class="mb-4 p-3.5 bg-blue-50 border border-blue-100 rounded-xl flex items-center justify-between shadow-sm animate-in fade-in duration-200">
                    <div class="flex items-center gap-2 truncate">
                        <span class="text-[9px] font-mono font-black bg-blue-600 text-white px-2 py-0.5 rounded shrink-0">SEC ${selectedSectionId} FILTER</span>
                        <span class="text-xs font-bold text-gray-700 truncate max-w-[180px]">${title}</span>
                    </div>
                    <button onclick="clearSectionSelection(event)" class="text-[9px] font-black text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-widest flex items-center gap-1 bg-white px-2.5 py-1 border border-blue-100 rounded-lg shadow-sm shrink-0">
                        <i data-lucide="x" class="w-3 h-3"></i> 全体表示
                    </button>
                </div>
                `;
            } else if (activeChapters.length > 0) {
                const count = activeChapters.length;
                activeFocusBanner = `
                <div class="mb-4 p-3 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-mono font-black bg-slate-800 text-white px-2 py-0.5 rounded">ALL CH FOCUS</span>
                        <span class="text-xs font-bold text-slate-600">${count === 1 ? `第 ${activeChapters[0]} 章` : `複数章合体中 (${activeChapters.join(', ')} 章)`}</span>
                    </div>
                </div>
                `;
            }

            area.innerHTML = activeFocusBanner + displayList.map(item => renderItem(item)).join('');
        }

        function renderItem(item) {
            let html = '';
            switch(item.type) {
                case 'section_header':
                    // Changed bg-blue-100 to bg-sky-50 with border
                    html = `<div class="mb-6 pt-2 pb-4 border-b border-gray-100">
                        <div class="inline-block bg-sky-50 text-sky-900 border border-sky-100/70 text-[13px] font-mono font-black px-2.5 py-0.5 rounded mb-2">SEC ${item.section_id}</div>
                        <h2 class="serif text-lg font-black text-gray-800 leading-tight">${item.title}</h2>
                    </div>`;
                    break;
                case 'question':
                    const qNum = String(item.number || '').padStart(4, '0');
                    html = `<div class="question-block">
                        <div class="flex items-start gap-3">
                            <div class="shrink-0 pt-0.5"><div class="q-number">${qNum}</div></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <div class="flex gap-1">
                                        ${item.label ? `<span class="tb-tag">${item.label}</span>` : ''}
                                        ${item.is_basic ? `<span class="tb-tag text-blue-500">基本</span>` : ''}
                                    </div>
                                    <button onclick="jumpToExplanationPopup('${item.id}', event)" class="jump-btn to-expl"><i data-lucide="help-circle" class="w-3 h-3"></i> 解説</button>
                                </div>
                                <div class="eng-text mb-1">${formatText(item.en)}</div>
                                ${renderDetails(item, ['en','label','number','is_frequent','is_basic','level'])}
                            </div>
                        </div>
                    </div>`;
                    break;
                case 'explanation':
                    const targetQ = items.find(it => it.id === item.target_q);
                    const tNum = targetQ ? String(targetQ.number).padStart(4, '0') : '--';
                    html = `<div class="flex gap-3">
                        <div class="shrink-0 w-8 flex flex-col items-center pt-2">
                             <div class="q-number !w-10">${tNum}</div>
                             <button onclick="jump('question', '${item.target_q}')" class="mt-2 text-blue-300"><i data-lucide="arrow-left-circle" class="w-5 h-5"></i></button>
                        </div>
                        <div class="flex-1">
                             <div class="explanation-pop">
                                 <div class="flex justify-between items-baseline mb-1 border-b border-emerald-100/30 pb-0.5">
                                     <h4 class="font-bold text-[13px] text-gray-700">${item.title || ''}</h4>
                                     <span class="tb-tag">${item.label || ''}</span>
                                 </div>
                                 ${renderDetails(item, ['title','label'])}
                             </div>
                        </div>
                    </div>`;
                    break;
                case 'grammar_term':
                    // Enlarged term index details mapping size text-[11px] -> text-xs
                    html = `<div class="term-box">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="p-1 bg-orange-100 text-orange-600 rounded shrink-0"><i data-lucide="book-type" class="w-3.5 h-3.5"></i></div>
                            ${item.number ? `<span class="font-mono text-xs font-black bg-orange-100 text-orange-850 px-2 py-0.5 rounded shrink-0">${item.number}</span>` : ''}
                            <div class="font-bold text-orange-900 text-sm">${item.term || ''}</div>
                        </div>
                        ${renderDetails(item, ['term'])}
                    </div>`;
                    break;
                case 'deep_dive':
                case 'summary_box':
                case 'confirmation_box':
                    let boxColorClass = item.type === 'deep_dive' ? 'deep-dive' : (item.type === 'confirmation_box' ? 'check-box' : 'summary-box');
                    let boxIcon = 'layers';
                    let boxIconClass = 'bg-slate-700 shadow-slate-100';
                    if (item.type === 'deep_dive') {
                        boxIcon = 'zoom-in';
                        boxIconClass = 'bg-teal-700 shadow-teal-100';
                    } else if (item.type === 'confirmation_box') {
                        boxIcon = 'check-square';
                        boxIconClass = 'bg-rose-700 shadow-rose-100';
                    }

                    // Enlarged box index details mapping text-[11px] -> text-sm
                    html = `<div class="${boxColorClass}">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-6 h-6 ${boxIconClass} text-white rounded flex items-center justify-center shrink-0">
                                <i data-lucide="${boxIcon}" class="w-3.5 h-3.5"></i>
                            </div>
                            ${item.number ? `<span class="font-mono text-sm font-black bg-slate-100 text-slate-800 px-2.5 py-0.5 rounded shrink-0">${item.number}</span>` : ''}
                            <h4 class="serif font-black text-slate-800 tracking-tight text-sm">${item.title || ''}</h4>
                        </div>
                        ${renderDetails(item, ['title'])}
                    </div>`;
                    break;
            }
            return `<div id="node-${item.id || item.order}" class="node">${html}</div>`;
        }

        function renderDetails(obj, exclude = []) {
            if (!obj || typeof obj !== 'object') return '';
            const skip = ['id', 'type', 'order', 'section_id', 'target_q', 'target_s', 'number', 'source_univ', 'is_frequent', 'is_basic', 'level', 'description', 'arrangement', 'columns', 'cols', ...exclude];
            
            const keys = Object.keys(obj);
            const entryTag = obj.tag && typeof obj.tag === 'string' ? obj.tag : null;
            const entryTagHtml = entryTag ? `<span class="bg-blue-100/80 text-blue-700 text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm mr-2 h-fit shrink-0 mt-0.5">${entryTag}</span>` : '';

            const contentHtml = keys.map(k => {
                if (skip.includes(k) || k === 'tag') return '';
                const val = obj[k];
                if (!val) return '';

                if (Array.isArray(val)) {
                    const cols = obj.columns || obj.cols || 1;
                    const gridClass = cols > 1 ? `grid grid-cols-${cols} gap-2 my-2` : 'space-y-1 my-1';
                    const itemsHtml = val.map(v => {
                        const solTag = k === 'solution' ? `<span class="bg-emerald-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm mr-1 shadow-sm inline-block align-top mt-0.5">sol</span>` : '';
                        if (typeof v === 'object') return `<div class="px-2 py-0.5 bg-white/50 border border-slate-50 rounded-lg my-0.5">${solTag}${renderDetails(v)}</div>`;
                        return `<div class="ja-text py-0 flex items-start gap-1">${solTag}<div class="flex-1">${formatText(v)}</div></div>`;
                    }).join('');

                    if (k === 'solution') {
                        return `<div class="ja-text px-2 py-1 bg-[#f1f5f3] border border-emerald-100 rounded my-0.5 leading-tight">${itemsHtml}</div>`;
                    }
                    return `<div class="${gridClass} my-0">${itemsHtml}</div>`;
                }

                if (typeof val === 'string') {
                    let content = '';
                    if (k === 'en') {
                        // Slightly larger (12.5px) for English outside main question
                        content = `<div class="supp-text !font-serif !font-medium !text-[12.5px] leading-snug">${formatText(val)}</div>`;
                    } else if (k === 'ja') {
                        if (obj.type === 'question') content = `<div class="ja-text">${formatText(val)}</div>`;
                        else content = `<div class="supp-text !font-normal !text-[12px] leading-snug">${formatText(val)}</div>`;
                    } else if (k === 'text' || k === 'note') {
                        content = `<div class="supp-text ${k==='note'?'opacity-60':''} leading-snug">${formatText(val)}</div>`;
                    } else if (k === 'answer') {
                        content = `<div class="text-[10px] font-black text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100 w-fit">Ans: ${formatText(val)}</div>`;
                    } else if (k === 'solution') {
                        content = `<div class="ja-text p-2 bg-[#f1f5f3] border border-emerald-100 rounded my-0.5 leading-tight"><span class="bg-emerald-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm mr-1">sol</span>${formatText(val)}</div>`;
                    } else {
                        content = `<div class="ja-text">${formatText(val)}</div>`;
                    }

                    if ((k === 'ja' || k === 'answer' || k === 'solution') && obj.type === 'question') {
                        return `<div class="masked-container" onclick="this.classList.toggle('revealed'); lucide.createIcons();">
                            <div class="masked-content">${content}</div>
                            <div class="mask-btn"><i data-lucide="eye" class="w-3 h-3 mr-2"></i> ${k==='ja'?'和訳':k==='answer'?'正解':'解説'}を表示</div>
                            <div class="hidden revealed:flex items-center justify-center bg-gray-100 text-gray-400 text-[10px] font-bold p-1 rounded-md mt-1 italic">タップして隠す</div>
                        </div>`;
                    }
                    return `<div class="my-0.5">${content}</div>`;
                }
                return '';
            }).join('');

            if (entryTagHtml) {
                return `<div class="flex items-start my-0.5">${entryTagHtml}<div class="flex-1">${contentHtml}</div></div>`;
            }
            return contentHtml;
        }

        function formatText(text) {
            if (!text) return '';
            return text.replace(/\\n/g, '<br>')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/__(.*?)__/g, '<span class="underline">$1</span>')
                .replace(/\[r\](.*?)\[\/r\]/g, '<span class="text-red-600 font-bold">$1</span>')
                .replace(/\[b\](.*?)\[\/b\]/g, '<span class="text-blue-600 font-bold">$1</span>')
                .replace(/\[g\](.*?)\[\/g\]/g, '<span class="text-emerald-700 font-bold">$1</span>')
                .replace(/\[m\](.*?)\[\/m\]/g, '<mark class="bg-yellow-100">$1</mark>')
                .replace(/\(\s+\)/g, '<span class="text-red-500 font-bold">(&nbsp;&nbsp;&nbsp;)</span>');
        }

        function jump(tab, id) {
            setTab(tab);
            setTimeout(() => {
                const el = document.getElementById(`node-${id}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('ring-4', 'ring-blue-100', 'rounded-lg');
                    setTimeout(() => el.classList.remove('ring-4', 'ring-blue-100'), 1500);
                }
            }, 100);
        }

        function jumpToExplanationPopup(qId, event) {
            if (event) event.stopPropagation();
            const expl = items.find(e => e.type === 'explanation' && e.target_q === qId);
            if (!expl) {
                alert('この問題の解説は見つかりませんでした。');
                return;
            }

            const modal = document.getElementById('explanation-modal');
            const numEl = document.getElementById('modal-q-num');
            const contentEl = document.getElementById('modal-content');
            
            const targetQ = items.find(it => it.id === qId);
            const targetQNum = targetQ ? String(targetQ.number || '').padStart(4, '0') : '--';
            
            numEl.innerText = `問 ${targetQNum}`;
            contentEl.innerHTML = `
                <div class="explanation-pop !border-emerald-200 !bg-emerald-50/20 p-4 rounded-xl">
                    <div class="flex justify-between items-baseline mb-2 pb-1 border-b border-emerald-150/45">
                        <h4 class="font-black text-gray-800 text-[13px] tracking-tight">${expl.title || ''}</h4>
                        <span class="tb-tag text-[#475569] shrink-0">${expl.label || ''}</span>
                    </div>
                    <div class="space-y-0.5 mt-2 text-slate-700 font-sans text-xs leading-relaxed">
                        ${renderDetails(expl, ['title', 'label'])}
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeExplanationModal() {
            const modal = document.getElementById('explanation-modal');
            if (modal) modal.classList.add('hidden');
        }

        function toggleSearch() {
            const sc = document.getElementById('search-container');
            sc.classList.toggle('hidden');
            if (!sc.classList.contains('hidden')) document.getElementById('search-input').focus();
        }

        document.getElementById('search-input').addEventListener('input', () => render());

        lucide.createIcons();
    </script>
    <!-- EXPLANATION POPUP MODAL -->
    <div id="explanation-modal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[85vh] animate-in zoom-in duration-200">
            <!-- Modal Head -->
            <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded uppercase tracking-wider">解説ポップアップ</span>
                    <span id="modal-q-num" class="text-xs font-mono font-black text-gray-400">Q ---</span>
                </div>
                <button onclick="closeExplanationModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-450 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <!-- Modal Body -->
            <div id="modal-content" class="p-5 overflow-y-auto space-y-4">
                <!-- Dynamic Content -->
            </div>
            <!-- Modal Foot -->
            <div class="px-5 py-3 border-t border-gray-50 flex justify-end">
                <button onclick="closeExplanationModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all">閉じる</button>
            </div>
        </div>
    </div>
</body>
</html>
